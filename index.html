<script>

// 👉 你的固定收款码内容（必须替换）
const ALIPAY_QR = "这里填你的支付宝收款码内容";

let cart = [];
let current = null;

// 添加商品
function addItem(name, price, icedOnly=false) {
  if (icedOnly) {
    cart.push({name: name+"(冰)", price});
    updateCart();
    return;
  }

  current = {name, price};
  document.getElementById("modalTitle").innerText = name;
  document.getElementById("tempModal").classList.remove("hidden");
}

// 选择冷热
function confirmTemp(temp){
  cart.push({
    name: current.name + "(" + temp + ")",
    price: current.price
  });
  closeModal();
  updateCart();
}

function closeModal(){
  document.getElementById("tempModal").classList.add("hidden");
}

// 更新购物车
function updateCart(){
  const list = document.getElementById("cartItems");
  const totalEl = document.getElementById("totalAmount");
  const cartBox = document.getElementById("cart");

  list.innerHTML = "";
  let total = 0;

  cart.forEach(item=>{
    list.innerHTML += `<div>${item.name} ¥${item.price}</div>`;
    total += item.price;
  });

  totalEl.innerText = "¥" + total;

  if(cart.length > 0){
    cartBox.classList.remove("hidden");
  }
}

// 🔥 核心：生成二维码（优化版）
function generateOrderQR(){

  if(cart.length === 0){
    alert("请先选择咖啡 ☕");
    return;
  }

  const total = cart.reduce((sum, item)=> sum + item.price, 0);

  // 👇 关键：把金额写进提示文本
  const payText = 
`订单金额：¥${total}
请在支付宝中输入该金额付款`;

  document.getElementById("qrcode").innerHTML = "";

  new QRCode(document.getElementById("qrcode"), {
    text: ALIPAY_QR,
    width: 200,
    height: 200
  });

  // 👇 显示金额提示（非常关键）
  document.getElementById("qrContainer").classList.remove("hidden");
  document.getElementById("qrContainer").innerHTML += `
    <div style="margin-top:12px;padding:12px;background:#fff3cd;border-radius:12px;text-align:center">
      <div style="font-weight:bold;font-size:18px">应付：¥${total}</div>
      <div style="font-size:12px;color:#666">请在支付宝输入该金额</div>
    </div>
  `;

  // 清空购物车（可选）
  cart = [];
}

</script>
