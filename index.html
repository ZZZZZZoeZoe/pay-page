<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☕ 咖啡点单</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body { font-family: system-ui; background:#f3f4f6; margin:0; }
.container { max-width:420px; margin:auto; background:white; padding:16px; min-height:100vh; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.card { padding:14px; border-radius:12px; background:white; box-shadow:0 2px 6px rgba(0,0,0,0.1); text-align:center; cursor:pointer;}
.btn { width:100%; padding:14px; background:#d97706; color:white; border:none; border-radius:12px; margin-top:16px; }
.hidden { display:none; }
.modal { position:fixed; inset:0; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; }
</style>
</head>

<body>

<div class="container">

<h2 style="text-align:center;">☕ 咖啡点单</h2>

<div class="grid">

<div class="card" onclick="add('美式 AMERICANO',18)">美式<br>AMERICANO</div>
<div class="card" onclick="add('橙C美式 ORANGE AMERICANO',22)">橙C<br>ORANGE</div>
<div class="card" onclick="add('椰青美式 COCONUT WATER AMERICANO',22)">椰青<br>COCONUT</div>
<div class="card" onclick="add('葡萄美式 GRAPE AMERICANO',22)">葡萄<br>GRAPE</div>
<div class="card" onclick="add('拿铁 LATTE',24)">拿铁<br>LATTE</div>
<div class="card" onclick="add('桂花拿铁 OSMANTHUS LATTE',30)">桂花<br>LATTE</div>
<div class="card" onclick="add('草莓拿铁 STRAWBERRY LATTE',30)">草莓<br>LATTE</div>
<div class="card" onclick="add('焦糖拿铁 CARAMEL LATTE',28)">焦糖<br>LATTE</div>

</div>

<div id="cartBox" class="hidden">
<h3>🛒 订单</h3>
<div id="cartList"></div>
<div><b>总计：<span id="total">¥0</span></b></div>
</div>

<button class="btn" onclick="pay()">生成付款码</button>

<div id="qr"></div>

</div>

<script>

const ALIPAY_URL = "https://qr.alipay.com/你的真实收款码";

let cart = [];

function add(name, price){
  cart.push({name,price});
  update();
}

function update(){
  let t = 0;
  let html = "";
  cart.forEach(i=>{
    html += `<div>${i.name} ¥${i.price}</div>`;
    t += i.price;
  });

  document.getElementById("cartList").innerHTML = html;
  document.getElementById("total").innerText = "¥" + t;
  document.getElementById("cartBox").classList.remove("hidden");
}

function pay(){

  if(cart.length===0){
    alert("先点咖啡");
    return;
  }

  let total = cart.reduce((s,i)=>s+i.price,0);

  document.getElementById("qr").innerHTML = "";
  new QRCode(document.getElementById("qr"), {
    text: ALIPAY_URL,
    width: 200,
    height: 200
  });

  document.getElementById("qr").innerHTML +=
    `<div style='text-align:center;margin-top:10px;font-weight:bold'>应付 ¥${total}</div>`;

  cart = [];
  update();
}

</script>

</body>
</html>
