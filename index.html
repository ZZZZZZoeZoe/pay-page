<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☕ 咖啡点单</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode.js@1.0.0/qrcode.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: system-ui; }
.card { transition: 0.2s; }
.card:hover { transform: translateY(-3px); }
</style>
</head>

<body class="bg-gray-100">

<div class="max-w-md mx-auto bg-white min-h-screen p-4">

<h1 class="text-2xl font-bold text-center mb-4">☕ 咖啡点单</h1>

<!-- 菜单 -->
<div class="grid grid-cols-2 gap-3">

<div onclick="addItem('美式',18)" class="card p-4 bg-white rounded-xl shadow text-center cursor-pointer">
☕<br>美式 ¥18
</div>

<div onclick="addItem('拿铁',24)" class="card p-4 bg-white rounded-xl shadow text-center cursor-pointer">
🥛<br>拿铁 ¥24
</div>

<div onclick="addItem('橙C美式',22,true)" class="card p-4 bg-white rounded-xl shadow text-center cursor-pointer">
🍊<br>橙C美式 ¥22<br><span class="text-xs text-gray-500">仅冰</span>
</div>

<div onclick="addItem('桂花拿铁',30)" class="card p-4 bg-white rounded-xl shadow text-center cursor-pointer">
🌸<br>桂花拿铁 ¥30
</div>

</div>

<!-- 购物车 -->
<div id="cartBox" class="mt-6 hidden">
<h2 class="font-bold mb-2">🛒 订单</h2>
<div id="cartList" class="text-sm"></div>
<div class="mt-2 font-bold">总计：<span id="total">¥0</span></div>
</div>

<!-- 按钮 -->
<button onclick="generateQR()" class="mt-6 w-full bg-amber-600 text-white py-3 rounded-xl text-lg">
生成付款码
</button>

<!-- 二维码 -->
<div id="qrBox" class="mt-6 hidden text-center"></div>

</div>

<!-- 弹窗 -->
<div id="modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center">
<div class="bg-white p-6 rounded-xl text-center">
<p id="modalTitle" class="mb-4 font-semibold"></p>
<button onclick="chooseTemp('热')" class="m-2 px-4 py-2 bg-red-200 rounded">🔥 热</button>
<button onclick="chooseTemp('冰')" class="m-2 px-4 py-2 bg-blue-200 rounded">❄️ 冰</button>
<br>
<button onclick="closeModal()" class="mt-4 text-gray-500">取消</button>
</div>
</div>

<script>

const ALIPAY_QR = "这里填你的支付宝收款二维码内容";

let cart = [];
let current = null;

// 添加商品
function addItem(name, price, icedOnly=false) {

  if (icedOnly) {
    cart.push({name: name+"(冰)", price});
    updateCart();
    return;
  }

  current = {name, price};
  document.getElementById("modalTitle").innerText = name;
  document.getElementById("modal").classList.remove("hidden");
}

// 选择冷热
function chooseTemp(temp){
  cart.push({
    name: current.name + "(" + temp + ")",
    price: current.price
  });
  closeModal();
  updateCart();
}

function closeModal(){
  document.getElementById("modal").classList.add("hidden");
}

// 更新购物车
function updateCart(){
  const list = document.getElementById("cartList");
  const totalEl = document.getElementById("total");
  const box = document.getElementById("cartBox");

  list.innerHTML = "";
  let sum = 0;

  cart.forEach(item=>{
    list.innerHTML += `<div>${item.name} ¥${item.price}</div>`;
    sum += item.price;
  });

  totalEl.innerText = "¥" + sum;

  if(cart.length > 0){
    box.classList.remove("hidden");
  }
}

// 生成二维码（核心）
function generateQR(){

  if(cart.length === 0){
    alert("请先点咖啡 ☕");
    return;
  }

  const total = cart.reduce((sum, item)=> sum + item.price, 0);

  const qrBox = document.getElementById("qrBox");

  // 清空并重建（避免叠加bug）
  qrBox.innerHTML = `
    <div id="qrcode" class="flex justify-center mb-4"></div>
    <div class="bg-yellow-100 p-3 rounded-xl">
      <div class="text-lg font-bold">应付：¥${total}</div>
      <div class="text-xs text-gray-600">请在支付宝输入该金额付款</div>
    </div>
  `;

  new QRCode(document.getElementById("qrcode"), {
    text: ALIPAY_QR,
    width: 200,
    height: 200
  });

  qrBox.classList.remove("hidden");

  // 清空购物车（防止重复）
  cart = [];
  updateCart();
}

</script>

</body>
</html>
