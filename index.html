<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☕ 点餐菜单</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body { font-family: system-ui; background:#f3f4f6; margin:0; }
.container { max-width:420px; margin:auto; background:white; padding:16px; min-height:100vh; }

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.card {
  padding:14px;
  border-radius:12px;
  background:white;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  text-align:center;
  cursor:pointer;
}

.card:hover { transform: translateY(-2px); }

.en { font-size:12px; color:#666; }
.price { font-weight:bold; color:#d97706; margin-top:4px; }

.btn {
  width:100%;
  padding:14px;
  background:#d97706;
  color:white;
  border:none;
  border-radius:12px;
  margin-top:16px;
  font-size:16px;
}

.hidden { display:none; }

/* modal */
.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:flex;
  align-items:center;
  justify-content:center;
}

.modal-content {
  background:white;
  padding:20px;
  border-radius:12px;
  text-align:center;
}
</style>
</head>

<body>

<div class="container">

<h2 style="text-align:center;">☕ 点餐菜单</h2>

<div class="grid">

<div class="card" onclick="addItem('美式 AMERICANO',18,false)">
☕<br>美式<br><div class="en">AMERICANO</div><div class="price">¥18</div>
</div>

<div class="card" onclick="addItem('橙 C 美式 ORANGE AMERICANO',22,true)">
🍊<br>橙 C 美式<br><div class="en">ORANGE AMERICANO</div><div class="price">¥22</div>
</div>

<div class="card" onclick="addItem('椰青美式 COCONUT WATER AMERICANO',22,true)">
🥥<br>椰青美式<br><div class="en">COCONUT WATER AMERICANO</div><div class="price">¥22</div>
</div>

<div class="card" onclick="addItem('葡萄美式 GRAPE AMERICANO',22,true)">
🍇<br>葡萄美式<br><div class="en">GRAPE AMERICANO</div><div class="price">¥22</div>
</div>

<div class="card" onclick="addItem('拿铁 LATTE',24,false)">
🥛<br>拿铁<br><div class="en">LATTE</div><div class="price">¥24</div>
</div>

<div class="card" onclick="addItem('桂花拿铁 OSMANTHUS LATTE',30,false)">
🌸<br>桂花拿铁<br><div class="en">OSMANTHUS LATTE</div><div class="price">¥30</div>
</div>

<div class="card" onclick="addItem('草莓拿铁 STRAWBERRY LATTE',30,false)">
🍓<br>草莓拿铁<br><div class="en">STRAWBERRY LATTE</div><div class="price">¥30</div>
</div>

<div class="card" onclick="addItem('焦糖拿铁 CARAMEL LATTE',28,false)">
🍯<br>焦糖拿铁<br><div class="en">CARAMEL LATTE</div><div class="price">¥28</div>
</div>

<div class="card" onclick="addItem('玫瑰拿铁 ROSE LATTE',30,false)">
🌹<br>玫瑰拿铁<br><div class="en">ROSE LATTE</div><div class="price">¥30</div>
</div>

<div class="card" onclick="addItem('肉桂拿铁 CINNAMON LATTE',30,false)">
🌿<br>肉桂拿铁<br><div class="en">CINNAMON LATTE</div><div class="price">¥30</div>
</div>

</div>

<!-- 购物车 -->
<div id="cartBox" class="hidden">
<h3>🛒 订单</h3>
<div id="cartList"></div>
<div><b>总计：<span id="total">¥0</span></b></div>
</div>

<button class="btn" onclick="generateQR()">生成付款二维码</button>

<div id="qrBox" class="hidden" style="text-align:center;margin-top:20px;"></div>

</div>

<!-- 冷热选择 -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <p id="modalTitle"></p>
    <button onclick="chooseTemp('热')">🔥 热</button>
    <button onclick="chooseTemp('冰')">❄️ 冰</button>
    <br><br>
    <button onclick="closeModal()">取消</button>
  </div>
</div>

<script>

// ✅ 你的支付宝收款码
const ALIPAY_URL = "https://qr.alipay.com/fkx16714c7pkca2vteocyea";

let cart = [];
let current = null;

// 点击商品
function addItem(name, price, needTemp){
  if(!needTemp){
    cart.push({name, price});
    updateCart();
    return;
  }

  current = {name, price};
  document.getElementById("modalTitle").innerText = name;
  document.getElementById("modal").classList.remove("hidden");
}

// 选择冷热
function chooseTemp(temp){
  cart.push({
    name: current.name + " (" + temp + ")",
    price: current.price
  });
  closeModal();
  updateCart();
}

function closeModal(){
  document.getElementById("modal").classList.add("hidden");
}

// 更新购物车
function updateCart(){
  let list = document.getElementById("cartList");
  let total = 0;
  list.innerHTML = "";

  cart.forEach(i=>{
    list.innerHTML += `<div>${i.name} ¥${i.price}</div>`;
    total += i.price;
  });

  document.getElementById("total").innerText = "¥" + total;

  if(cart.length > 0){
    document.getElementById("cartBox").classList.remove("hidden");
  }
}

// 生成二维码
function generateQR(){

  if(cart.length === 0){
    alert("请先选择咖啡 ☕");
    return;
  }

  let total = cart.reduce((s,i)=>s+i.price,0);

  let box = document.getElementById("qrBox");
  box.innerHTML = "";

  new QRCode(box, {
    text: ALIPAY_URL,
    width: 200,
    height: 200
  });

  box.innerHTML += `
    <div style="margin-top:10px;font-size:18px;font-weight:bold;">
      应付 ¥${total}
    </div>
    <div style="font-size:12px;color:#666;">
      请用支付宝扫码付款
    </div>
  `;

  box.classList.remove("hidden");

  cart = [];
  updateCart();
}

</script>

</body>
</html>
