<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☕ 点餐菜单</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body { font-family: system-ui; background:#f3f4f6; margin:0; }

.container {
  max-width:420px;
  margin:auto;
  background:white;
  padding:16px;
  min-height:100vh;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.card {
  padding:14px;
  border-radius:12px;
  background:white;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  text-align:center;
  cursor:pointer;
}

.en { font-size:12px; color:#666; }
.price { font-weight:bold; color:#d97706; }

.btn {
  width:100%;
  padding:14px;
  background:#d97706;
  color:white;
  border:none;
  border-radius:12px;
  margin-top:16px;
  font-size:16px;
}

/* 🚨 关键修复：不用 hidden，直接控制 display */
.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none; /* 默认隐藏 */
  align-items:center;
  justify-content:center;
}

.modal.show {
  display:flex; /* 显示 */
}

.modal-content {
  background:white;
  padding:20px;
  border-radius:12px;
  text-align:center;
}
</style>
</head>

<body>

<div class="container">

<h2 style="text-align:center;">☕ 点餐菜单</h2>

<div class="grid">

<div class="card" onclick="selectItem('美式 AMERICANO',18,true)">美式 AMERICANO ¥18</div>
<div class="card" onclick="selectItem('橙 C 美式 ORANGE AMERICANO',22,false)">橙 C 美式 ORANGE AMERICANO ¥22</div>
<div class="card" onclick="selectItem('椰青美式 COCONUT WATER AMERICANO',22,false)">椰青美式 COCONUT WATER AMERICANO ¥22</div>
<div class="card" onclick="selectItem('葡萄美式 GRAPE AMERICANO',22,false)">葡萄美式 GRAPE AMERICANO ¥22</div>
<div class="card" onclick="selectItem('拿铁 LATTE',24,true)">拿铁 LATTE ¥24</div>
<div class="card" onclick="selectItem('桂花拿铁 OSMANTHUS LATTE',30,true)">桂花拿铁 OSMANTHUS LATTE ¥30</div>
<div class="card" onclick="selectItem('草莓拿铁 STRAWBERRY LATTE',30,true)">草莓拿铁 STRAWBERRY LATTE ¥30</div>
<div class="card" onclick="selectItem('焦糖拿铁 CARAMEL LATTE',28,true)">焦糖拿铁 CARAMEL LATTE ¥28</div>
<div class="card" onclick="selectItem('玫瑰拿铁 ROSE LATTE',30,true)">玫瑰拿铁 ROSE LATTE ¥30</div>
<div class="card" onclick="selectItem('肉桂拿铁 CINNAMON LATTE',30,true)">肉桂拿铁 CINNAMON LATTE ¥30</div>

</div>

<div id="cartBox">
<h3>🛒 订单</h3>
<div id="cartList"></div>
<div><b>总计：<span id="total">¥0</span></b></div>
</div>

<button class="btn" onclick="pay()">生成付款二维码</button>

<div id="qrBox" style="text-align:center;margin-top:20px;"></div>

</div>

<!-- modal -->
<div id="modal" class="modal">
  <div class="modal-content">
    <p id="title"></p>
    <button onclick="choose('热')">🔥 热</button>
    <button onclick="choose('冰')">❄️ 冰</button>
    <br><br>
    <button onclick="closeModal()">取消</button>
  </div>
</div>

<script>

const ALIPAY_URL = "https://qr.alipay.com/fkx16714c7pkca2vteocyea";

let cart = [];
let current = null;

// 👉 选商品
function selectItem(name, price, needTemp){

  if(!needTemp){
    cart.push({name, price});
    update();
    return;
  }

  current = {name, price};

  document.getElementById("title").innerText = name;
  document.getElementById("modal").classList.add("show");
}

// 👉 选冷热
function choose(temp){

  cart.push({
    name: current.name + " (" + temp + ")",
    price: current.price
  });

  current = null;
  closeModal();
  update();
}

// 👉 关闭弹窗（彻底关闭）
function closeModal(){
  document.getElementById("modal").classList.remove("show");
  current = null;
}

// 👉 更新订单
function update(){

  let list = document.getElementById("cartList");
  let total = 0;

  list.innerHTML = "";

  cart.forEach(i=>{
    list.innerHTML += `<div>${i.name} ¥${i.price}</div>`;
    total += i.price;
  });

  document.getElementById("total").innerText = "¥" + total;
}

// 👉 支付
function pay(){

  if(cart.length === 0){
    alert("请先选择咖啡 ☕");
    return;
  }

  let total = cart.reduce((s,i)=>s+i.price,0);

  let box = document.getElementById("qrBox");
  box.innerHTML = "";

  new QRCode(box, {
    text: ALIPAY_URL,
    width: 200,
    height: 200
  });

  box.innerHTML += `<div style="margin-top:10px;font-weight:bold;">应付 ¥${total}</div>`;

  cart = [];
  update();
}

</script>

</body>
</html>
