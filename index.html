<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☕ 咖啡点单</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode.js@1.0.0/qrcode.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
.card { transition: 0.2s; }
.card:hover { transform: translateY(-3px); }
</style>
</head>

<body class="bg-gray-100">

<div class="max-w-md mx-auto bg-white min-h-screen p-4">

<h1 class="text-2xl font-bold text-center mb-4">☕ 咖啡点单</h1>

<!-- 菜单 -->
<div class="grid grid-cols-2 gap-3">

<div onclick="addItem('美式 AMERICANO',18)" class="card p-4 bg-white rounded-xl shadow text-center cursor-pointer">☕<br>美式 ¥18</div>

<div onclick="addItem('橙C美式 ORANGE AMERICANO',22,true)" class="card p-4 bg-white rounded-xl shadow text-center cursor-pointer">🍊<br>橙C美式 ¥22</div>

<div onclick="addItem('椰青美式 COCONUT WATER AMERICANO',22,true)" class="card p-4 bg-white rounded-xl shadow text-center cursor-pointer">🥥<br>椰青美式 ¥22</div>

<div onclick="addItem('葡萄美式 GRAPE AMERICANO',22,true)" class="card p-4 bg-white rounded-xl shadow text-center cursor-pointer">🍇<br>葡萄美式 ¥22</div>

<div onclick="addItem('拿铁 LATTE',24)" class="card p-4 bg-white rounded-xl shadow text-center cursor-pointer">🥛<br>拿铁 ¥24</div>

<div onclick="addItem('桂花拿铁 OSMANTHUS LATTE',30)" class="card p-4 bg-white rounded-xl shadow text-center cursor-pointer">🌸<br>桂花拿铁 ¥30</div>

<div onclick="addItem('草莓拿铁 STRAWBERRY LATTE',30)" class="card p-4 bg-white rounded-xl shadow text-center cursor-pointer">🍓<br>草莓拿铁 ¥30</div>

<div onclick="addItem('焦糖拿铁 CARAMEL LATTE',28)" class="card p-4 bg-white rounded-xl shadow text-center cursor-pointer">🍯<br>焦糖拿铁 ¥28</div>

<div onclick="addItem('玫瑰拿铁 ROSE LATTE',30)" class="card p-4 bg-white rounded-xl shadow text-center cursor-pointer">🌹<br>玫瑰拿铁 ¥30</div>

<div onclick="addItem('肉桂拿铁 CINNAMON LATTE',30)" class="card p-4 bg-white rounded-xl shadow text-center cursor-pointer">🌿<br>肉桂拿铁 ¥30</div>

</div>

<!-- 购物车 -->
<div id="cartBox" class="mt-6 hidden">
<h2 class="font-bold mb-2">🛒 订单</h2>
<div id="cartList"></div>
<div class="mt-2 font-bold">总计：<span id="total">¥0</span></div>
</div>

<button onclick="generateQR()" class="mt-6 w-full bg-amber-600 text-white py-3 rounded-xl">
生成付款码
</button>

<div id="qrBox" class="mt-6 hidden text-center"></div>

</div>

<!-- 弹窗 -->
<div id="modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center">
<div class="bg-white p-6 rounded-xl text-center">
<p id="modalTitle"></p>
<button onclick="chooseTemp('热')" class="m-2 px-4 py-2 bg-red-200 rounded">🔥 热</button>
<button onclick="chooseTemp('冰')" class="m-2 px-4 py-2 bg-blue-200 rounded">❄️ 冰</button>
</div>
</div>

<script>

// ⚠️ 先测试用这个
const ALIPAY_QR = "https://www.baidu.com";

let cart = [];
let current = null;

function addItem(name, price, icedOnly=false){
  if(icedOnly){
    cart.push({name:name+"(冰)",price});
    updateCart();
    return;
  }
  current={name,price};
  document.getElementById("modalTitle").innerText=name;
  document.getElementById("modal").classList.remove("hidden");
}

function chooseTemp(temp){
  cart.push({name:current.name+"("+temp+")",price:current.price});
  document.getElementById("modal").classList.add("hidden");
  updateCart();
}

function updateCart(){
  let list=document.getElementById("cartList");
  let total=0;
  list.innerHTML="";
  cart.forEach(i=>{
    list.innerHTML+=`<div>${i.name} ¥${i.price}</div>`;
    total+=i.price;
  });
  document.getElementById("total").innerText="¥"+total;
  if(cart.length>0) document.getElementById("cartBox").classList.remove("hidden");
}

function generateQR(){
  if(cart.length===0){
    alert("先点咖啡");
    return;
  }

  const total=cart.reduce((s,i)=>s+i.price,0);

  const qrBox=document.getElementById("qrBox");
  qrBox.innerHTML=`
    <div id="qrcode"></div>
    <div style="margin-top:10px;font-weight:bold">应付 ¥${total}</div>
    <div style="font-size:12px;color:#666">请在支付宝输入金额</div>
  `;

  new QRCode(document.getElementById("qrcode"),{
    text:ALIPAY_QR,
    width:200,
    height:200
  });

  qrBox.classList.remove("hidden");

  cart=[];
  updateCart();
}

</script>

</body>
</html>
